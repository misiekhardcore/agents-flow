name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail
          current=$(jq -r '.version' package.json)
          IFS='.' read -r major minor patch <<<"$current"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          {
            echo "version=$new"
            echo "tag=v$new"
          } >> "$GITHUB_OUTPUT"

      - name: Bump package.json
        run: |
          set -euo pipefail
          v="${{ steps.bump.outputs.version }}"
          tmp=$(mktemp)
          jq --arg v "$v" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

      - name: Update CHANGELOG
        run: |
          set -euo pipefail
          tag="${{ steps.bump.outputs.tag }}"
          sed -i '/^## \[Unreleased\]/,/^## \[/{/^## \[Unreleased\]/d;/^## \[/!d}' CHANGELOG.md
          npx git-cliff --tag "$tag" --unreleased --prepend CHANGELOG.md

      - name: Commit, tag, push
        run: |
          set -euo pipefail
          git add package.json CHANGELOG.md
          git commit -m "chore: release ${{ steps.bump.outputs.tag }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "${{ steps.bump.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Generate release body
        run: |
          set -euo pipefail
          npx git-cliff --latest --strip header --output /tmp/release-body.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file /tmp/release-body.md
